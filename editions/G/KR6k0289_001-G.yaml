body:
  text: 弘一大藏經會謹案表無表章科承李芳遠居士寄來大師手稿僅列初辨名以下各科缺去乃至十諸科如得續稿當再補錄初標題二本文初標分二解釋初辨名初標列二解釋初列名初總列初今名乃至十二古名二別列初表色初通三乘立二表二局大乘加意表初更加意表初立義二釋名二無表色二詳意無表二引證三總結初列三義初發無表初唯善能發二不善亦發初標宗二不發無表初總立自宗初總簡二述理初善惡相例二別釋初身語二三業相例初相例二意業三約三性簡二引文初敘意二別破前師初破三業相例初正破四約三聚簡二引文二破善惡相例二通難二陳義意初述第三師意初釋名通局二證名通局初引遠行前思初論文二章釋二以能起律儀證初論文初標數列名二次第解釋初前七通明七眾戒初明受戒初第一受緣二第八通明定道戒二第二受體二章釋二明持戒初專精不犯三以意律儀證初論文二犯已能悔二述前二師意初總述前二師意二章釋三通受持初下中唯約在家初下品二別述第二意二上品並約七眾二中品三總判正不正二無表色初列二義初三類義初標列二引證初引三文初對法論初論文二五十三二章釋三五十四二總釋成初總出處中體二別釋五十四初正釋論文二二類義初立宗二轉引文證二引文初合引二文初引二論意三總結二會通伏難二章家正證二述二義意初正述初述初師義初以猛利義同相例二詳判二述二師義二以律儀名同相例三以二性類同相例二釋名初標章二解釋初總釋表無表初釋三表業二別釋律不律二釋無表業初身表業初身義初以積集義釋初泛釋身名二以通名別二以依止義釋初標舉引論二以通名別三雙證二種義初引論初證依止義二證積聚義二章釋二表義初單釋表義初表自義二身表合釋二破古義三業義初單釋二合釋初假業二語表業二實業三意表業二語表業初單釋初出體初正出語體二釋義二總指表業二合釋初語表合釋三別述語表三意表業初離釋二表業合釋初假業二合釋二實業二釋無表業初直釋無表二指略不引二別釋律不律初各別釋名二無表合釋初解律儀初標列二別釋初別脫律儀初別脫初離釋二合釋二律儀初離釋初略標自義二述古師義三重述自義二合釋初持業釋二依士釋初標宗二靜慮律儀初明靜慮初正釋靜慮初離釋二引例二總合釋二引釋異名二合釋三無漏律儀初釋無漏與律儀初離釋二不律儀二釋聖所愛戒二合釋初隣近釋二持業初正解三總結二遮妨初正遮不同二因釋尸羅初正立自宗二古義招難三重述正義初立義三處中初不合六釋二會難初徵難二同依業釋三總結二會難
